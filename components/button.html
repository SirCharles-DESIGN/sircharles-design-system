<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SirCharles.DESIGN — Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;900&display=swap">
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/spacing.css">
  <style>
    body {
      background: var(--color-bg-page);
      color: var(--color-fg-primary);
      font-family: var(--font-body);
      padding: var(--page-pad-y) var(--page-pad-x);
      margin: 0;
    }
    .stage { max-width: 720px; display: grid; gap: var(--sp-8); }
    .row   { display: flex; flex-wrap: wrap; gap: var(--sp-4); align-items: center; }
    .label { color: var(--color-fg-primary); opacity: 0.6; font-size: var(--fs-12); text-transform: uppercase; letter-spacing: var(--ls-uppercase); margin-bottom: var(--sp-2); }

    /* ============================================================
       Button — base + variants
       Variants: primary (cyan-on-black), ghost (transparent + cyan border),
                 inverse (black-on-cyan), link
       Sizes:    sm, md (default), lg
       States:   default, hover, active, focus, disabled
       Per theme: pill radius (120px), uppercase, hairline border
       ============================================================ */
    .sc-btn {
      --_bg:        transparent;
      --_fg:        var(--sc-cyan);
      --_border:    var(--sc-cyan);
      --_pad-y:     0.875rem;
      --_pad-x:     1.75rem;
      --_fs:        var(--fs-14);

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      padding: var(--_pad-y) var(--_pad-x);
      background: var(--_bg);
      color: var(--_fg);
      border: var(--bw-hairline) solid var(--_border);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-weight: var(--fw-bold);
      font-size: var(--_fs);
      text-transform: var(--tt-button);
      letter-spacing: var(--ls-uppercase);
      text-decoration: none;
      cursor: pointer;
      transition:
        background var(--dur-base) var(--ease-standard),
        color      var(--dur-base) var(--ease-standard),
        box-shadow var(--dur-base) var(--ease-standard),
        transform  var(--dur-fast) var(--ease-standard);
    }

    /* Variants */
    .sc-btn--primary { --_bg: var(--sc-cyan); --_fg: var(--sc-black); --_border: var(--sc-cyan); }
    .sc-btn--ghost   { /* uses defaults */ }
    .sc-btn--inverse { --_bg: var(--sc-white); --_fg: var(--sc-black); --_border: var(--sc-white); }
    .sc-btn--link    {
      --_pad-y: 0; --_pad-x: 0; --_border: transparent; --_bg: transparent;
      border-bottom: var(--bw-hairline) solid var(--sc-cyan);
      border-radius: 0; padding-bottom: 4px;
    }

    /* Sizes */
    .sc-btn--sm { --_pad-y: 0.5rem;   --_pad-x: 1.125rem; --_fs: var(--fs-12); }
    .sc-btn--lg { --_pad-y: 1.125rem; --_pad-x: 2.5rem;   --_fs: var(--fs-16); }

    /* States */
    .sc-btn:hover  { box-shadow: var(--shadow-glow-sm); }
    .sc-btn--primary:hover { box-shadow: var(--shadow-glow-md); }
    .sc-btn:active { transform: translateY(1px); }
    .sc-btn:focus-visible {
      outline: none;
      box-shadow: var(--shadow-glow-md), 0 0 0 3px var(--sc-cyan-30);
    }
    .sc-btn[disabled],
    .sc-btn[aria-disabled="true"] {
      opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none;
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1 style="font-size: var(--fs-40); font-weight: var(--fw-black); letter-spacing: var(--ls-display); margin: 0;">
      Button
    </h1>

    <div>
      <div class="label">Primary — for the one action that matters</div>
      <div class="row">
        <button class="sc-btn sc-btn--primary sc-btn--sm">Say Hello</button>
        <button class="sc-btn sc-btn--primary">Say Hello</button>
        <button class="sc-btn sc-btn--primary sc-btn--lg">Say Hello</button>
        <button class="sc-btn sc-btn--primary" disabled>Disabled</button>
      </div>
    </div>

    <div>
      <div class="label">Ghost — the workhorse</div>
      <div class="row">
        <button class="sc-btn sc-btn--ghost sc-btn--sm">Full HIVE Story</button>
        <button class="sc-btn sc-btn--ghost">Full HIVE Story</button>
        <button class="sc-btn sc-btn--ghost sc-btn--lg">Full HIVE Story</button>
      </div>
    </div>

    <div>
      <div class="label">Inverse — when sitting on cyan or imagery</div>
      <div class="row" style="background: var(--sc-cyan); padding: var(--sp-6); border-radius: var(--radius-grid);">
        <button class="sc-btn sc-btn--inverse">Let's Build</button>
        <button class="sc-btn sc-btn--inverse sc-btn--lg">Let's Build Something Amazing</button>
      </div>
    </div>

    <div>
      <div class="label">Link — inline, low-friction</div>
      <p>For more on the methodology, <a href="#" class="sc-btn sc-btn--link">read the full case study</a>.</p>
    </div>
  </div>
</body>
</html>
