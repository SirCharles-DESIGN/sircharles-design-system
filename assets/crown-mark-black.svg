<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="SirCharles crown mark">
  <g fill="#000000">
    <!-- Base — narrowed so its sides align with the side spikes' outer edges -->
    <rect x="4" y="18" width="24" height="10"/>
    <!-- Left spike: right-angled triangle, vertical OUTER edge at x=4 -->
    <polygon points="4,18 10,18 4,9"/>
    <!-- Middle spike: isoceles triangle -->
    <polygon points="10,18 22,18 16,7"/>
    <!-- Right spike: mirror of left, vertical OUTER edge at x=28 -->
    <polygon points="22,18 28,18 28,9"/>
    <!-- Three perfect circles. Side balls overhang slightly past the vertical edges. -->
    <circle cx="4"  cy="9" r="2.5"/>
    <circle cx="16" cy="7" r="2.5"/>
    <circle cx="28" cy="9" r="2.5"/>
  </g>
</svg>
